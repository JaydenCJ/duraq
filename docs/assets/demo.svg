<svg xmlns="http://www.w3.org/2000/svg" width="720" height="482" viewBox="0 0 720 482" font-family="Menlo, Consolas, monospace" font-size="13">
  <rect width="720" height="482" rx="10" fill="#101418"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="22" r="6" fill="#27c93f"/>
  <text x="360" y="27" fill="#8b949e" text-anchor="middle" font-size="12">duraq — a durable queue any HTTP client can consume</text>
  <g fill="#c9d1d9">
    <text x="24" y="60"><tspan fill="#7ee787">$</tspan> duraq serve --data ./data &amp;</text>
    <text x="24" y="80" fill="#8b949e">duraq 0.1.0 serving on http://127.0.0.1:7333 (data: ./data, queues: 0)</text>
    <text x="24" y="112"><tspan fill="#7ee787">$</tspan> curl -X PUT 127.0.0.1:7333/q/jobs -d '{}'   <tspan fill="#8b949e"># create the queue</tspan></text>
    <text x="24" y="132">{ <tspan fill="#79c0ff">"name"</tspan>: <tspan fill="#a5d6ff">"jobs"</tspan>, <tspan fill="#79c0ff">"config"</tspan>: { … }, <tspan fill="#79c0ff">"ready"</tspan>: <tspan fill="#d2a8ff">0</tspan>, … }</text>
    <text x="24" y="164"><tspan fill="#7ee787">$</tspan> curl -X POST 127.0.0.1:7333/q/jobs/messages -d '{"task":"resize"}'</text>
    <text x="24" y="184">{ <tspan fill="#79c0ff">"id"</tspan>: <tspan fill="#a5d6ff">"0000000000000001"</tspan> }</text>
    <text x="24" y="216"><tspan fill="#7ee787">$</tspan> curl '127.0.0.1:7333/q/jobs/messages?wait=20'   <tspan fill="#8b949e"># long-poll</tspan></text>
    <text x="24" y="236">{ <tspan fill="#79c0ff">"messages"</tspan>: [ {</text>
    <text x="24" y="256">    <tspan fill="#79c0ff">"id"</tspan>: <tspan fill="#a5d6ff">"0000000000000001"</tspan>, <tspan fill="#79c0ff">"receipt"</tspan>: <tspan fill="#a5d6ff">"r0000000000000002"</tspan>,</text>
    <text x="24" y="276">    <tspan fill="#79c0ff">"body"</tspan>: <tspan fill="#a5d6ff">"{\"task\":\"resize\"}"</tspan>, <tspan fill="#79c0ff">"receives"</tspan>: <tspan fill="#d2a8ff">1</tspan> } ] }</text>
    <text x="24" y="308"><tspan fill="#7ee787">$</tspan> curl -X DELETE '.../messages/0000000000000001?receipt=r00…02'</text>
    <text x="24" y="328" fill="#8b949e">204 No Content            <tspan fill="#7ee787">✔ acked — gone forever</tspan></text>
    <text x="24" y="360"><tspan fill="#7ee787">$</tspan> tail -2 data/wal.ndjson   <tspan fill="#8b949e"># the queue IS this file</tspan></text>
    <text x="24" y="380" fill="#d2a8ff">{"op":"recv","q":"jobs","id":"0000000000000001",…,"receipt":"r00…02","count":1}</text>
    <text x="24" y="400" fill="#d2a8ff">{"op":"ack","q":"jobs","id":"0000000000000001",…,"receipt":"r00…02"}</text>
    <text x="24" y="432"><tspan fill="#7ee787">$</tspan> kill %1 &amp;&amp; duraq serve --data ./data   <tspan fill="#8b949e"># crash? replay.</tspan></text>
    <text x="24" y="452" fill="#8b949e">duraq 0.1.0 serving on http://127.0.0.1:7333 (data: ./data, queues: 1)</text>
  </g>
</svg>
